name: Android V117 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v117-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V117
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V117 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v117.apk
          sha256sum output/apk/BetValueAnalyzer-v117.apk > output/apk/BetValueAnalyzer-v117.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v117 --yes --cleanup-tag || true
          gh release create v117 \
            output/apk/BetValueAnalyzer-v117.apk \
            output/apk/BetValueAnalyzer-v117.sha256 \
            --title "BetValue Analyzer V117" \
            --notes "APK V117 construit automatiquement depuis main. Version Android: 5.1.3 / versionCode 117. Corrige l'ouverture detail qui pouvait rattacher une autre fiche, ajoute le polling cloud apres demande IA, active le mode multi-IA GitHub Models en double, ajoute le fallback shared_results pour les fiches ouvertes et valide le flux cloud avec providerCount=2."
