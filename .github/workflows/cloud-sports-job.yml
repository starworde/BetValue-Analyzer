name: BetValue cloud sports job

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud-job/**"
      - ".github/workflows/cloud-sports-job.yml"
  schedule:
    # UTC. Check automatique toutes les ~90 minutes pour garder Firebase plus frais
    # sans dépasser volontairement un rythme gratuit raisonnable.
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"

permissions:
  contents: read

jobs:
  cloud-sports-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: cloud-job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run cloud sports job
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EVENT_LOOKAHEAD_DAYS: "365"
          MAX_RESULTS_TO_WRITE: "1200"
        run: npm start
