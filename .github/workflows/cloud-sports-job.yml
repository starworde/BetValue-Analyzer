name: BetValue cloud sports job

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud-job/**"
      - "firestore.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/cloud-sports-job.yml"
  schedule:
    # UTC. Check automatique toutes les heures avec cache Firestore/IA pour rester compatible quota gratuit.
    - cron: "0 * * * *"

permissions:
  contents: read
  models: read

jobs:
  cloud-sports-job:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: cloud-job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Deploy Firestore rules
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: node deploy-rules.mjs

      - name: Run cloud sports job
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EVENT_LOOKAHEAD_DAYS: "365"
          MAX_RESULTS_TO_WRITE: "450"
          MAX_REMOVED_SPORT_DELETES: "40"
          AI_MODE: "automatic"
          MAX_AI_EVENTS: "6"
          AI_TARGET_POOL_SIZE: "120"
          AI_REQUEST_POOL_SIZE: "80"
          AI_CACHE_ENABLED: "0"
          AI_CACHE_TTL_HOURS: "24"
          AI_HTTP_TIMEOUT_MS: "12000"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODELS_ENABLED: "1"
          GITHUB_MODELS_MULTI: "1"
          GITHUB_MODELS_MULTI_LIMIT: "3"
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
          GITHUB_MODELS_MODEL_POOL: ${{ vars.GITHUB_MODELS_MODEL_POOL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_FREE_ENABLED: ${{ vars.MISTRAL_FREE_ENABLED }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FREE_MODEL: ${{ vars.OPENROUTER_FREE_MODEL }}
        run: npm start
