name: BetValue cloud sports job

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud-job/**"
      - ".github/workflows/cloud-sports-job.yml"
  schedule:
    # UTC. Check automatique toutes les 3 heures pour rester compatible quota gratuit Firestore.
    # Le job prémâche les analyses sans réécrire inutilement trop souvent.
    - cron: "0 */3 * * *"

permissions:
  contents: read

jobs:
  cloud-sports-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: cloud-job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run cloud sports job
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EVENT_LOOKAHEAD_DAYS: "365"
          MAX_RESULTS_TO_WRITE: "900"
          MAX_REMOVED_SPORT_DELETES: "120"
        run: npm start
