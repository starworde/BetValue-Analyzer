name: BetValue cloud sports job

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud-job/**"
      - "firestore.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/cloud-sports-job.yml"
  schedule:
    # UTC. Check automatique toutes les 2 heures avec cache Firestore/IA pour rester compatible quota gratuit.
    - cron: "0 */2 * * *"

permissions:
  contents: read
  models: read

jobs:
  cloud-sports-job:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    defaults:
      run:
        working-directory: cloud-job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Deploy Firestore rules
        working-directory: .
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: |
          node -e "const fs=require('fs'); const raw=process.env.FIREBASE_SERVICE_ACCOUNT_JSON; if(!raw) throw new Error('Missing FIREBASE_SERVICE_ACCOUNT_JSON'); const json=raw.trim().startsWith('{') ? raw : Buffer.from(raw.trim(),'base64').toString('utf8'); fs.writeFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS, json);"
          npx -y firebase-tools@13 deploy --only firestore:rules --project "$FIREBASE_PROJECT_ID" --non-interactive

      - name: Run cloud sports job
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EVENT_LOOKAHEAD_DAYS: "365"
          MAX_RESULTS_TO_WRITE: "900"
          MAX_REMOVED_SPORT_DELETES: "120"
          AI_MODE: "automatic"
          MAX_AI_EVENTS: "32"
          AI_TARGET_POOL_SIZE: "320"
          AI_CACHE_TTL_HOURS: "12"
          AI_HTTP_TIMEOUT_MS: "12000"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODELS_ENABLED: "1"
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_FREE_ENABLED: ${{ vars.MISTRAL_FREE_ENABLED }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FREE_MODEL: ${{ vars.OPENROUTER_FREE_MODEL }}
        run: npm start
