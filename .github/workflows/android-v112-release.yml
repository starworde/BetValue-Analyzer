name: Android V112 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v112-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V112
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V112 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v112.apk
          sha256sum output/apk/BetValueAnalyzer-v112.apk > output/apk/BetValueAnalyzer-v112.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v112 --yes --cleanup-tag || true
          gh release create v112 \
            output/apk/BetValueAnalyzer-v112.apk \
            output/apk/BetValueAnalyzer-v112.sha256 \
            --title "BetValue Analyzer V112" \
            --notes "APK V112 construit automatiquement depuis main. Version Android: 4.99.0 / versionCode 112. Stabilisation live, IA analyste, diagnostic sources/cloud, sports supprimés et garde-fous tests."
