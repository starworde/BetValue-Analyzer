name: Android V115 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v115-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V115
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V115 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v115.apk
          sha256sum output/apk/BetValueAnalyzer-v115.apk > output/apk/BetValueAnalyzer-v115.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v115 --yes --cleanup-tag || true
          gh release create v115 \
            output/apk/BetValueAnalyzer-v115.apk \
            output/apk/BetValueAnalyzer-v115.sha256 \
            --title "BetValue Analyzer V115" \
            --notes "APK V115 construit automatiquement depuis main. Version Android: 5.1.1 / versionCode 115. Ancienne pre-analyse locale masquee, analyses IA anciennes ou generiques refusees, diagnostic cloud nettoye, messages 429 rendus lisibles, web app alignee."
