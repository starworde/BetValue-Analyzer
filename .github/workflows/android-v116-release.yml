name: Android V116 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v116-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V116
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V116 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v116.apk
          sha256sum output/apk/BetValueAnalyzer-v116.apk > output/apk/BetValueAnalyzer-v116.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v116 --yes --cleanup-tag || true
          gh release create v116 \
            output/apk/BetValueAnalyzer-v116.apk \
            output/apk/BetValueAnalyzer-v116.sha256 \
            --title "BetValue Analyzer V116" \
            --notes "APK V116 construit automatiquement depuis main. Version Android: 5.1.2 / versionCode 116. Analyse IA cloud demandee sur fiche ouverte, job IA leger toutes les 15 minutes, matching corrige entre noms de competitions traduits, lecture directe Firestore par evenement et audit lint/tests OK."
