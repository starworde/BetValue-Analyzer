name: BetValue cloud AI requests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloud-job/**"
      - ".github/workflows/cloud-ai-requests-job.yml"
      - ".github/workflows/cloud-sports-job.yml"
  schedule:
    # UTC. Petit job frequent: traite seulement les fiches ouvertes/demandees.
    - cron: "*/15 * * * *"

permissions:
  contents: read
  models: read

jobs:
  cloud-ai-requests-job:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: cloud-job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Run requested AI analyses
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EVENT_LOOKAHEAD_DAYS: "365"
          MAX_RESULTS_TO_WRITE: "1200"
          MAX_REMOVED_SPORT_DELETES: "0"
          AI_MODE: "automatic"
          AI_REQUEST_ONLY: "1"
          AI_REQUIRE_REQUESTS: "1"
          MAX_AI_EVENTS: "6"
          AI_TARGET_POOL_SIZE: "180"
          AI_REQUEST_POOL_SIZE: "80"
          AI_CACHE_ENABLED: "0"
          AI_HTTP_TIMEOUT_MS: "12000"
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODELS_ENABLED: "1"
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_FREE_ENABLED: ${{ vars.MISTRAL_FREE_ENABLED }}
          MISTRAL_MODEL: ${{ vars.MISTRAL_MODEL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FREE_MODEL: ${{ vars.OPENROUTER_FREE_MODEL }}
        run: npm start
