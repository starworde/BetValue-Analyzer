name: Android V113 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v113-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V113
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V113 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v113.apk
          sha256sum output/apk/BetValueAnalyzer-v113.apk > output/apk/BetValueAnalyzer-v113.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v113 --yes --cleanup-tag || true
          gh release create v113 \
            output/apk/BetValueAnalyzer-v113.apk \
            output/apk/BetValueAnalyzer-v113.sha256 \
            --title "BetValue Analyzer V113" \
            --notes "APK V113 construit automatiquement depuis main. Version Android: 5.0.0 / versionCode 113. Nouvelle couche multi-IA gratuite côté cloud, analyse IA approfondie, diagnostic IA/Firebase, web app mise à jour, cache Firestore et fallback local sans clé dans l'APK."
