name: Android V100 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v100-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V100
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V100 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v100.apk
          sha256sum output/apk/BetValueAnalyzer-v100.apk > output/apk/BetValueAnalyzer-v100.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v100 --yes --cleanup-tag || true
          gh release create v100 \
            output/apk/BetValueAnalyzer-v100.apk \
            output/apk/BetValueAnalyzer-v100.sha256 \
            --title "BetValue Analyzer V100" \
            --notes "APK V100 construit automatiquement depuis main. Version Android: 4.87.0 / versionCode 100."
