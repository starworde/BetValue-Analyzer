name: Android V114 release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-v114-release.yml"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK V114
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Test, lint and export V114 APK
        run: ./gradlew testDebugUnitTest lintDebug exportVersionedApk --no-daemon --stacktrace

      - name: Check APK
        shell: bash
        run: |
          test -f output/apk/BetValueAnalyzer-v114.apk
          sha256sum output/apk/BetValueAnalyzer-v114.apk > output/apk/BetValueAnalyzer-v114.sha256
          ls -lh output/apk/

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release delete v114 --yes --cleanup-tag || true
          gh release create v114 \
            output/apk/BetValueAnalyzer-v114.apk \
            output/apk/BetValueAnalyzer-v114.sha256 \
            --title "BetValue Analyzer V114" \
            --notes "APK V114 construit automatiquement depuis main. Version Android: 5.1.0 / versionCode 114. Vraie couche Analyste IA via GitHub Models côté GitHub Actions, affichage compact type analyste sportif, cache local ignoré quand il ne contient qu’une pré-analyse, sources IA nettoyées, web app alignée."
